# Global data settings
data:
  processed_path: "data/processed_data.feather"
  timezone: "UTC"

# Global finance defaults
finance:
  default_wacc: 0.07

# Shared defaults (applied to every scenario unless overridden)
defaults:
  # RES assumptions (per MW of RES capacity)
  res:
    capex_per_mw_eur: 1_000_000
    opex_per_mw_per_year_eur: 30_000
    lifetime_years: 25
    offshore_max_distance_km: 200 # offshore wind area restrictions

  # Electrolyser assumptions (per MW electrolyser capacity)
  electrolyser:
    capex_per_mw_eur: 700_000
    opex_per_mw_per_year_eur: 20_000
    lifetime_years: 20
    efficiency_kwh_per_kg: 55

  # Optimisation grid for RES:electrolyser ratio
  optimization:
    min_res_per_el_mw: 1.0
    max_res_per_el_mw: 18.0
    steps: 171
    electrolyser_mw: 10.0  # optional; used only if you don't pass DRI-sized MW into the optimiser

  # DRI-scale sizing inputs
  dri_sizing:
    dri_mt_per_year: 2.0
    h2_intensity_kg_per_t_dri: 50.0
    availability_target: 1.0 # assumes continous coverage for sizing, no downtime/repair. (design assumption for required annual H2 delivery), while actual utilisation remains driven by the hourly CF profile and the chosen RES-to-electrolyser oversizing ratio.

  # Firming res_to_h2
  firming:
    firm_power_fraction: 0.95 # = "allowed_hourly_deficit_fraction" .Share of HOURS where P_RES ≥ P_EL. It answers In how many hours can I run at full electrolyser capacity?95% of hours meet full power (hour-based metric)

  # Storage Proxy (Stage 3A)
  storage_proxy:
    enabled: true
    roundtrip_efficiency: 0.90 # you charge 1 MWh you get back 0.9 MWh
    capex_eur_per_kwh: 150
    lifetime_years: 15
    allowed_energy_deficit_fraction: 0.05   # Share of ANNUAL ENERGY that can be delivered after shifting, Allow up to 5% of annual baseload energy to remain uncovered
    max_storage_duration_hours: 48 #“Short-duration battery proxy (48h maximum duration)”

# Scenarios = only what changes per run
scenarios:
  - profile_source: "atlite"
    country: "DE"
    tech: "wind_onshore"
    variant: "avg"
    year: 2023

  - profile_source: "atlite"
    country: "DE"
    tech: "wind_onshore"
    variant: "bestsite_p95"
    year: 2023

  - profile_source: "atlite"
    country: "DE"
    tech: "solar"
    variant: "bestsite_p95"
    year: 2023

  - profile_source: "atlite"
    country: "DE"
    tech: "solar"
    variant: "avg"
    year: 2023

  - profile_source: "atlite"
    country: "AUS"
    tech: "wind_onshore"
    variant: "avg"
    year: 2023

  - profile_source: "atlite"
    country: "AUS"
    tech: "wind_onshore"
    variant: "bestsite_p95"
    year: 2023

  - profile_source: "atlite"
    country: "AUS"
    tech: "solar"
    variant: "avg"
    year: 2023

  - profile_source: "atlite"
    country: "AUS"
    tech: "solar"
    variant: "bestsite_p95"
    year: 2023

