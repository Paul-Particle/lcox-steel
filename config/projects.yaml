projects:
  - name: DE_2023_baseline
    time_period:
      start_date: "20230101"
      end_date:   "20231231"
    bidding_zone: DE_LU     # ENTSO-E zone key; used when any scenario includes grid
    cf_area: de             # key in config.res_cf.countries
    scenarios:
      - name: dedicated_res
        # techs: future additions — grid, hvac, hvdc, heat_storage, and others
        techs: [wind_onshore, solar]
        # site_selection: one of pypsa-optimized, random, complementarity-optimized,
        #   country-average, wind-p95, solar-p95, coordinates
        site_selection: country-average
      - name: wind_only
        techs: [wind_onshore]
        site_selection: country-average
      - name: solar_only
        techs: [solar]
        site_selection: country-average
      - name: grid_connected
        techs: [wind_onshore, solar, grid]
        site_selection: country-average
