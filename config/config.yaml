# Configuration for the cfp_data_analysis project

scheduler: greedy

entsoe:
  # Per-(area, data_type) downloads are pulled on demand by config/projects.csv;
  # the bidding-zone catalog lives in data/entsoe_cache/entsoe_bidding_zones.csv.
  data_types: [prices, load_forecast, load_actual, res, generation, crossborder]

res_cf:
  # Per-country metadata for the atlite + capacity factor pipeline.
  # Lowercase key = ISO-2 (used in cutout filenames and CF output filenames).
  #   iso3:           3-letter code for Natural Earth ADM0_A3 lookup
  #   region:         tag stored in regions.geojson (mostly ISO-2, but AUS/BRA
  #                   stayed ISO-3 historically — kept that way to avoid
  #                   regenerating the geojson and chasing downstream)
  #   coarse:         use a coarser cutout resolution to avoid CDS instability
  #                   / memory limits for large countries
  #   mainland_bbox:  optional [lon_min, lon_max, lat_min, lat_max] — keeps only
  #                   polygon parts whose centroid falls inside the box. Used
  #                   to drop overseas territories (e.g. metropolitan France).
  #   vic_bbox:       AUS-only; approximates NEM zone VIC1 for sub-national tests
  #                   (Natural Earth 1:110m has no state boundaries, so we use a
  #                   bbox).
  countries:
    de:  { iso3: DEU, region: DE,  coarse: false }
    fr:  { iso3: FRA, region: FR,  coarse: false, mainland_bbox: [-10, 15, 41, 52] }
    es:  { iso3: ESP, region: ES,  coarse: false }
    aus: { iso3: AUS, region: AUS, coarse: true,  vic_bbox: [140.96, 149.97, -39.16, -34.00] }
    bra: { iso3: BRA, region: BRA, coarse: true  }

  # atlite technology settings (passed to cutout.wind / cutout.pv).
  wind_onshore_turbine:  Vestas_V112_3MW
  wind_offshore_turbine: NREL_ReferenceTurbine_5MW_offshore
  pv_panel:              CSi
  pv_orientation:        latitude_optimal

  year: 2025
  top_n: 10
  offshore_max_distance_km: 200

  # Wind CF computation flags — passed to atlite.Cutout.wind() in
  # build_cf_timeseries, make_bestsite_cf, resource_spread.
  # smooth=True             smooths the turbine power curve
  # add_cutout_windspeed    preserves atlite's built-in 25 m/s cutoff during smoothing
  # spatial_avg_window      odd-N square window of cells averaged for wind site CFs
  #                         (used in make_bestsite_cf to approximate wind farm scale)
  wind_cf:
    smooth: true
    add_cutout_windspeed: true
    spatial_avg_window: 3

  # Atlite cutout build settings.
  # bbox_pad_deg            degrees of padding added around country/region bounds.
  cutout:
    bbox_pad_deg: 1.0

  complementarity:
    coincidence_threshold: 0.20
    w_coincidence: 0.6
    w_correlation: 0.4
    max_radius_km: 300.0
    quality_floor: 0.90
    # Triplet count threshold above which complementarity.py switches from
    # exhaustive brute-force screening to greedy + neighbourhood search.
    max_triplets_brute_force: 500000
