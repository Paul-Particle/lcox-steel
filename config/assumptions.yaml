finance:
  default_wacc: 0.07

plant:
  dri_mt_per_year: 0.526  # 100 MW H2 LHV input × 8760 h / 33.33 kWh/kg / 50 kg/t
  h2_intensity_kg_per_t_dri: 50.0
  # Floor for electrolyser sizing — the optimiser may grow it further when the
  # extra capacity earns its capex via buffer-mediated arbitrage of cheap RES.
  availability_target: 0.95

res:
  wind-onshore:
    capex_per_mw_eur: 1_000_000
    opex_per_mw_per_year_eur: 30_000
    lifetime_years: 25
  solar:
    capex_per_mw_eur: 600_000
    opex_per_mw_per_year_eur: 12_000
    lifetime_years: 25
  wind-offshore:
    capex_per_mw_eur: 2_500_000
    opex_per_mw_per_year_eur: 75_000
    lifetime_years: 25

electrolyser:
  capex_per_mw_eur: 700_000
  opex_per_mw_per_year_eur: 20_000
  lifetime_years: 20
  efficiency_kwh_per_kg: 55   # nominal; future: add overload_efficiency_kwh_per_kg

battery:
  capex_per_mw_eur: 200_000   # power capacity cost
  capex_per_mwh_eur: 150_000  # energy capacity cost
  lifetime_years: 15
  efficiency_roundtrip: 0.90
  max_hours: 6                # cap on energy/power ratio

h2_buffer:
  capex_per_mwh_eur: 10_000   # compressed H2 tank, ~€10/kWh
  lifetime_years: 25
  # e_nom_extendable always True — PyPSA finds optimal buffer size

transmission:
  # HVDC link connecting a candidate RES site to the electrolyser/demand site.
  # Only used by multi-site scenarios (those with a config/sites_{project}_{scenario}.yaml
  # overlay); single-site scenarios never add a transmission link.
  cost_per_mw_per_km_eur: 400   # HVDC overhead, order-of-magnitude (PyPSA-Eur-ish)
  lifetime_years: 40
  losses_pct_per_1000km: 3.0    # ~3% / 1000 km, applied as link efficiency
  indirect_route_factor: 1.25   # great-circle distance → routed cable length
