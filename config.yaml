# Configuration for the cfp_data_analysis project

scheduler: greedy
 
entsoe_download:
  start_date: "20241230" # format as YYYYMMDD
  end_date: "20241231"
  rebuild: false # not implemented, use snakemake --rerun-triggers input params to avoid re-downloading
 
entsoe_integration:
  start_date: "20230101"
  end_date: "20241231"

nem_download:
  start_date: "20230101" # format as YYYYMMDD
  end_date: "20230131"
  nemosis_cache_dir: "data/nemosis_cache"
  rebuild: false

data_types: ["prices", "load_forecast", "load_actual", "vre", "generation", "crossborder"]

res_cf:
  countries: ["de"]   # expand to ["de","fr","es","aus","bra"] for full runs
  year: 2023
  top_n: 10
  offshore_max_distance_km: 200
  complementarity:
    coincidence_threshold: 0.20
    w_coincidence: 0.6
    w_correlation: 0.4
    max_radius_km: 300.0
    quality_floor: 0.90
